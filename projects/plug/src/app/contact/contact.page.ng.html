<!-- Main Content -->
<main class="flex flex-grow justify-center py-10 px-4 sm:px-6 lg:px-8">
	<div
		class="grid grid-cols-1 gap-12 w-full max-w-7xl lg:grid-cols-12 lg:gap-20"
	>
		<!-- Left Side: Contact Info & Heading -->
		<div class="flex flex-col gap-8 lg:col-span-5">
			<!-- Heading -->
			<div class="flex flex-col gap-4">
				<h1
					class="text-4xl font-black tracking-tight leading-tight sm:text-5xl dark:text-white text-[#111618]"
				>
					Get in Touch
				</h1>
				<p class="text-lg leading-relaxed dark:text-gray-400 text-[#617c89]">
					Need help with a tutorial or defense project? We usually reply within
					24 hours. Fill out the form or reach us via email.
				</p>
			</div>
			<!-- Info Grid -->
			<div class="grid grid-cols-1 gap-6 pt-4 sm:grid-cols-2 lg:grid-cols-1">
				<!-- Email Item -->
				<div class="flex gap-4 items-start">
					<div
						class="flex justify-center items-center mt-1 rounded-full size-10 bg-primary/10 text-primary"
					>
						<span class="icon-[material-symbols--mail-outline]"></span>
					</div>
					<div>
						<p
							class="text-base font-bold dark:text-white text-(--mat-sys-primary)"
						>
							Email Support
						</p>
						<a
							class="transition-colors dark:text-gray-400 text-(--mat-sys-secondary) hover:text-primary"
							href="mailto:support@academicplug.com"
							>support@academicplug.com</a
						>
					</div>
				</div>
				<!-- FAQ Item -->
				<div class="flex gap-4 items-start">
					<div
						class="flex justify-center items-center mt-1 rounded-full size-10 bg-primary/10 text-primary"
					>
						<span class="icon-[material-symbols--help-outline]"></span>
					</div>
					<div>
						<p
							class="text-base font-bold dark:text-white text-(--mat-sys-primary)"
						>
							Help Center
						</p>
						<a
							class="flex gap-1 items-center transition-colors dark:text-gray-400 text-[#617c89] hover:text-primary"
							href="#"
						>
							Visit our FAQ Page
							<span
								class="text-sm icon-[material-symbols--arrow-forward]"
							></span>
						</a>
					</div>
				</div>
				<!-- Socials Item -->
				<div class="flex gap-4 items-start">
					<div
						class="flex justify-center items-center mt-1 rounded-full size-10 bg-primary/10 text-primary"
					>
						<span class="icon-[material-symbols--share-outline]"></span>
					</div>
					<div>
						<p
							class="mb-2 text-base font-bold dark:text-white text-(--mat-sys-primary)"
						>
							Follow Us
						</p>
						<div class="flex gap-3">
							<a
								class="flex justify-center items-center bg-gray-100 rounded-full transition-all dark:bg-gray-800 hover:text-white size-8 text-[#617c89] hover:bg-primary"
								href="#"
							>
								<span
									class="icon-[logos--x]"
									role="img"
									aria-hidden="true"
								></span>
							</a>
							<a
								class="flex justify-center items-center bg-gray-100 rounded-full transition-all dark:bg-gray-800 hover:text-white size-8 text-[#617c89] hover:bg-primary"
								href="#"
							>
								<span
									class="icon-[skill-icons--instagram]"
									role="img"
									aria-hidden="true"
								></span>
							</a>
							<a
								class="flex justify-center items-center bg-gray-100 rounded-full transition-all dark:bg-gray-800 hover:text-white size-8 text-[#617c89] hover:bg-primary"
								href="#"
							>
								<span
									class="icon-[skill-icons--linkedin]"
									role="img"
									aria-hidden="true"
								></span>
							</a>
						</div>
					</div>
				</div>
			</div>
			<!-- Abstract Visual -->
			<div
				class="hidden overflow-hidden relative mt-auto w-full h-48 bg-gradient-to-br rounded-xl lg:block from-primary/5 to-primary/20"
				data-alt="Abstract gradient wave pattern representing flow and connection"
				style="background-image: radial-gradient(circle at 10% 20%, rgba(17, 147, 212, 0.1) 0%, transparent 20%), radial-gradient(circle at 90% 80%, rgba(17, 147, 212, 0.1) 0%, transparent 20%);"
			>
				<div
					class="flex absolute inset-0 justify-center items-center opacity-10"
				>
					<svg
						class="w-full h-full text-primary"
						preserveaspectratio="none"
						viewbox="0 0 100 100"
						xmlns="http://www.w3.org/2000/svg"
					>
						<path d="M0 100 C 20 0 50 0 100 100 Z" fill="currentColor"></path>
					</svg>
				</div>
			</div>
		</div>
		<!-- Right Side: Contact Form -->
		<div class="lg:col-span-7">
			<mat-card>
				<mat-card-content>
					<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
						<mat-form-field>
							<mat-label>Full name</mat-label>
							<input matInput>
						</mat-form-field>

						<mat-form-field>
							<mat-label>Email Address</mat-label>
							<input type="email" matInput>
						</mat-form-field>

						<mat-form-field>
							<mat-label>Subject</mat-label>
							<input matInput>
						</mat-form-field>

						<mat-form-field>
							<mat-label>Message</mat-label>
							<textarea matInput placeholder="Describe your request"></textarea>
						</mat-form-field>

						<!-- Submit Button -->
						<div class="pt-2">
							<button matButton="filled" type="submit">
								<span>Send Message</span>
								<mat-icon matSuffix>
									<span
										class="text-sm icon-[material-symbols--send-outline]"
									></span>
								</mat-icon>
							</button>
						</div>
					</form>
				</mat-card-content>
			</mat-card>
		</div>
	</div>
</main>
